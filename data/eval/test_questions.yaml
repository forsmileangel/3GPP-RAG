- qid: q28
  question: "What is the test purpose of the absolute power tolerance test?"
  spec: "38.521-1"
  expected_section: "6.3.4.2"
  expected_keywords: ["set its initial output power", "larger than 20ms"]
  question_type: section_summary
  difficulty: medium
  notes: "Test-purpose triplet with q29/q30 — all three 6.3.4.x.1 purposes open
