# Phase A test bank — TS 38.521-1 (NR FR1 UE conformance)
# Sourced from spike/questions.yaml + Phase 0 reality_check.md lessons.
# Every question must scope-validate: expected_keywords must appear in the
# expected_section's page range. tests/test_question_bank.py enforces this.
#
# Phase 0 lessons baked in:
#   - q04 / q05 expected_section corrected from §6.2.4 / §6.2.5 to §6.3.1 /
#     §6.3.2 (the Phase 0 spike found their answers live in §6.3, not §6.2 —
#     see reality_check.md "Mistake 3: scope misjudgement").
#   - Each question carries question_type matching the v2.1 query router
#     taxonomy (numeric / procedure / table_lookup / section_summary /
#     comparison / out_of_scope).
#
# Schema:
#   qid:                 unique short id
#   question:            natural-language question
#   spec:                spec_name (e.g. "38.521-1")
#   expected_section:    section_number where the answer should live
#   expected_keywords:   list of substrings — at least one must appear in
#                        the expected_section's page text for the question
#                        to pass scope-validation
#   question_type:       one of {numeric, procedure, table_lookup,
#                        section_summary, comparison, out_of_scope}
#   difficulty:          easy | medium | hard
#   notes:               (optional) why this question is in the bank

